<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Todo List</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="wrapper">
    <h1>Todo List 📝</h1>

    <!-- input section -->
    <div class="add-todo">
      <input id="todoInput" type="text" placeholder="what needs to be done?" />
      <button id="addBtn">add</button>
    </div>

    <!-- shows up if input is empty -->
    <span id="errMsg" class="err-msg"></span>

    <!-- todos go here -->
    <ul id="todoList"></ul>
  </div>

  <!-- firebase (using compat version bc easier to work with) -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

 <script src="firebase-config.js"></script>
<script src="firestore.js"></script>
<script src="realtime-db.js"></script>
<script src="app.js"></script>


</body>
</html>
